replicaCount: 1

image:
  repository: andikapri/argocd-app-service1
  tag: "20260419-0050-3"
  pullPolicy: Always

imagePullSecrets:
  - name: regcred

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  host: dev.kube.rayhan-belajar.my.id
  tls:
    - hosts:
        - dev.kube.rayhan-belajar.my.id
      secretName: dev-kube-rayhan-belajar-tls
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-issuer-nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-buffer-size: 256k
    nginx.ingress.kubernetes.io/service-upstream: 'true'

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

env:
  APP_ENV: development
  LOG_LEVEL: debug

livenessProbe:
  httpGet:
    path: /hello
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /hello
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
